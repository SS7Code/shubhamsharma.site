    projects:
      - name: "Virtual Element Methods for Phase Field Fracture"
        start_date: 2019-08
        end_date: 2025-07
        highlights:
          - "Developed a robust VEM framework for phase field fracture modeling of homogeneous and composite materials"
          - "Reduced computational time by **up to 60%** using a novel mesh transition strategy"
          - "Implemented VEM in ABAQUS via user subroutines (UEL)"
          - "Generated non-matching, Voronoi, and non-convex meshes using MATLAB"

      - name: "Modeling of Brittle Damage in Rubbery Polymers"
        start_date: 2019-08
        end_date: 2022-07
        highlights:
          - "Incorporated material and geometric non-linearity in an in-house damage model for brittle crack propagation"
          - "Wrote a full non-linear FEM solver in MATLAB; achieved **7x speedup** via parallel programming"
          - "Validated simulation results against experimental data"

      - name: "Crack Propagation in 3D Adhesive Layers (ISRO Funded)"
        start_date: 2019-08
        end_date: 2023-07
        highlights:
          - "Implemented a 3D phase field fracture model using ABAQUS UEL subroutines"
          - "Validated against experimental data provided by the ISRO review team"
          - "Prepared quarterly reports and presented to ISRO review committee"

      - name: "Neural Network Based Analysis of Asphalt Pavements"
        start_date: 2018-08
        end_date: 2019-07
