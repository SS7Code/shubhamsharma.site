    Projects:
      - name: "Virtual Element Methods for Phase Field Fracture"
        summary: "Developed a robust VEM framework for phase field fracture modeling of homogeneous and composite materials. Reduced computational time by up to 60% using a novel mesh transition strategy. Implemented VEM in ABAQUS via user subroutines (UEL) and generated non-matching, Voronoi, and non-convex meshes using MATLAB."
        highlights:
          - "60% reduction in computational time via novel mesh transition strategy"
          - "ABAQUS UEL implementation of VEM"
          - "Voronoi and non-convex mesh generation in MATLAB"
        start_date: 2019-08-01
        end_date: 2025-07-01

      - name: "Modeling of Brittle Damage in Rubbery Polymers"
        summary: "Incorporated material and geometric non-linearity in an in-house damage model to simulate brittle crack propagation in rubbery polymers. Wrote a full non-linear FEM solver in MATLAB and achieved a 7x speedup using parallel programming."
        highlights:
          - "7x computational speedup via MATLAB parallel programming"
          - "Validated against experimental data"
        start_date: 2019-08-01
        end_date: 2022-07-01

      - name: "Crack Propagation in 3D Adhesive Layers (ISRO Funded)"
        summary: "Implemented a 3D phase field fracture model using ABAQUS UEL subroutines to simulate crack propagation in adhesive layers. Validated simulation results against experimental data provided by the ISRO review team."
        highlights:
          - "3D phase field fracture implementation in ABAQUS"
          - "Quarterly reporting and presentations to ISRO review team"
        start_date: 2019-08-01
        end_date: 2023-07-01

      - name: "Neural Network Based Analysis of Asphalt Pavements"
        summary: "Developed an ANN architecture to predict critical strains in pavement sections under moving loads, eliminating the need for conventional 3D FEM linear elastic simulations. Automated training dataset generation from ABAQUS using Python scripts."
        highlights:
          - "ANN-based surrogate model replacing 3D FEM simulations"
          - "Automated dataset generation pipeline using Python and ABAQUS"
        start_date: 2018-08-01
        end_date: 2019-07-01

